spring.application.name=userservice

spring.web.error.include-binding-errors=always
spring.web.error.include-exception=true
spring.web.error.include-message=always

spring.datasource.url=jdbc:mysql://localhost:3306/springboot_microservices
spring.datasource.username=root
spring.datasource.password=admin
# Driverclass & Dialect is Optional
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jackson.mapper.sort-properties-alphabetically=false
