spring.application.name=orderservice

server.port=8085
spring.web.error.include-binding-errors=always
spring.web.error.include-exception=true
spring.web.error.include-message=always

spring.datasource.url=jdbc:mysql://localhost:3306/orderdb
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8099/eureka
eureka.client.registry-fetch-interval-seconds=10

logging.pattern.level=%5p[${spring.application.name},%X{traceId},%X{spanId}]

logging.level.org.springframework.web=DEBUG
management.tracing.sampling.probability=1
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans