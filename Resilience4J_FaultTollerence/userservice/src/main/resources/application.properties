spring.application.name=userservice

spring.web.error.include-binding-errors=always
spring.web.error.include-exception=true
spring.web.error.include-message=always

spring.datasource.url=jdbc:mysql://localhost:3306/userdb
spring.datasource.username=root
spring.datasource.password=admin
# Driverclass & Dialect is Optional
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jackson.mapper.sort-properties-alphabetically=false

order.service.uri=http://orderservice/order

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8099/eureka
eureka.client.registry-fetch-interval-seconds=10

management.endpoints.web.exposure.include=*

logging.pattern.level=%5p[${spring.application.name},%X{traceId},%X{spanId}]
logging.level.org.springframework.web=DEBUG
management.tracing.sampling.probability=1

#management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans


management.health.circuitbreakers.enabled=true

resilience4j.retry.instances.orderretry.max-attempts=1
resilience4j.retry.instances.orderretry.wait-duration=1s

# Configuring circuite breaker for only one instance such as orderretry
#resilience4j.circuitbreaker.instances.orderretry.register-health-indicator=true
#resilience4j.circuitbreaker.instances.orderretry.sliding-window-size=5
#resilience4j.circuitbreaker.instances.orderretry.minimum-number-of-calls=3
#resilience4j.circuitbreaker.instances.orderretry.permitted-number-of-calls-in-half-open-state=2
#resilience4j.circuitbreaker.instances.orderretry.wait-duration-in-open-state=10s
#resilience4j.circuitbreaker.instances.orderretry.automatic-transition-from-open-to-half-open-enabled=true
#resilience4j.circuitbreaker.instances.orderretry.failure-rate-threshold=50
#resilience4j.circuitbreaker.instances.orderretry.event-consumer-buffer-size=10

#configure default settings for all CircuitBreakers
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=5
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=3
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.event-consumer-buffer-size=10